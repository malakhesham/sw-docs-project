<div class="container">

  <div class="left-column">
    <div class="header-row">
      <div>
        <h1>💰 Personal Finance Dashboard</h1>
        <p class="muted">Track monthly spending, subscriptions and income</p>
      </div>
      <div class="actions-row">
        
         <button 
          class="primary" 
          (click)="openAddModal()"
          style="padding: 12px 20px;background:#22c55e; color:black;font-weight: 600;border: none;border-radius: 10px;
          cursor: pointer;font-size: 15px;display: flex;gap: 8px;transition: all 0.2s ease;">+ Add Transaction</button>
          
      </div>
    </div>
    
     
    <div style="display:flex;gap:1rem;align-items:stretch;margin:1rem 0">
      <app-summary-cards [transactions]="transactions()"></app-summary-cards>
    
      
    </div>

    <div class="card" style="margin-top:1rem">
      <h3 style="margin:0 0 0.5rem 0">Transactions</h3>
      <app-expense-list [transactionsIn]="filteredTransactions()" (edit)="openAddModal($event)"></app-expense-list>
    </div>
  </div>

  <aside class="right-column">
    <div class="card chart-wrapper">
      <h3 style="margin:0 0 0.5rem 0">Spending by Category</h3>
      <app-chart [transactions]="filteredTransactions()"></app-chart>
    </div>

    <div class="card" style="margin-top:1rem">
      <h3 style="margin:0 0 0.5rem 0">Filters</h3>
  <app-filter-chips [categories]="uniqueCategories()" (selected)="setFilters($event)"></app-filter-chips>
    </div>
  </aside>

        <div *ngIf="showModal" class="modal"> 
        <app-add-transaction [transaction]="editingTransaction()" (close)="showModal = false" (saved)="handleSave($event)"></app-add-transaction>
