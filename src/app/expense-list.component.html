
<div>

  <h3>Recent Transactions</h3>

  <input [(ngModel)]="search" placeholder="Search transactions..."
    style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #334155;background:#0f172a;color:white">

  <table style="width:100%;border-collapse:collapse;border-radius:10px;overflow:hidden">

    <thead style="background:#1f2937;color:white">
      <tr>
        <th style="padding:10px;text-align:left">Title</th>
        <th style="padding:10px;text-align:left">Amount</th>
        <th style="padding:10px;text-align:left">Category</th>
        <th style="padding:10px;text-align:left">Type</th>
        <th style="padding:10px;text-align:left">Action</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let t of filteredTransactions"
        style="border-bottom:1px solid #1f2937">

        <td style="padding:10px">{{ t.title }}</td>
        <td style="padding:10px">{{ t.amount | currency }}</td>
        <td style="padding:10px">{{ t.category }}</td>
        <td style="padding:10px">{{ t.type }}</td>

        <td style="padding:10px">

          <button class="action-btn"
            (click)="startEdit(t)"
            style="padding:6px 10px;margin-right:6px;border:none;border-radius:6px;background:#f59e0b;color:black;cursor:pointer">
            Edit
          </button>

          <button class="action-btn"
            (click)="delete(t.id)"
            style="padding:6px 10px;border:none;border-radius:6px;background:#ef4444;color:white;cursor:pointer">
            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
